defaults:
  - rllm: base
  - rllm/backend: tinker
  - _self_

hydra:
  run:
    dir: outputs/grpo/${run_name}
  searchpath:
    - pkg://rllm.experimental.config

# Required: short description of what's new in this run, e.g.:
#   run_name="sft-warmstart-top3"
#   run_name="grpo-longer-horizon"
run_name: ???
train_files: null
val_files: null
val_puzzles: null

training:
  default_local_dir: "checkpoints/grpo/${run_name}"
  group_size: 8           # 8 samples per position; balance between variance and throughput

data:
  train_batch_size: 32    # 32 positions × 8 rollouts = 256 rollouts/step
  max_response_length: 1024  # enough for board CoT + <move>...</move>

workflow:
  n_parallel_tasks: 512

rllm:
  trainer:
    project_name: "chess-grpo"
    experiment_name: "grpo-${run_name}"
    default_local_dir: "checkpoints/grpo/${run_name}"
    logger: ["console", "ui"]
    max_steps: 2000
    total_epochs: 1
    save_freq: 25
    test_freq: 50
